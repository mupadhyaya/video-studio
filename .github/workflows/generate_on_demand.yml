name: Generate & Render On Demand

on:
  workflow_dispatch:
    inputs:
      day_number:
        description: "Day/Lesson number to generate (e.g., 1 for lesson_001)"
        required: true
        default: "1"

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      YOUTUBE_OAUTH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_TOKEN }}

    steps:
      # ── 1. Checkout repository ─────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 3. Install system dependencies ─────────────────────────────────────
      - name: Install ffmpeg and fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-dejavu

      # ── 4. Install Python dependencies ─────────────────────────────────────
      - name: Install Python packages
        run: pip install -r requirements.txt

      # ── 5. Generate lesson JSON via Gemini ─────────────────────────────────
      - name: Generate daily lesson JSON
        run: python generate_daily_script.py --day ${{ github.event.inputs.day_number }}

      # ── 6. Render dual-language videos ─────────────────────────────────────
      - name: Render presentation videos
        run: |
          DAY_PADDED=$(printf "%03d" ${{ github.event.inputs.day_number }})
          LESSON_FILE="rag-learning-series/lesson_${DAY_PADDED}/lesson_${DAY_PADDED}.json"
          VIDEO_ID="lesson_${DAY_PADDED}"
          echo "Rendering from: $LESSON_FILE (video-id: $VIDEO_ID)"
          python run_pipeline.py --input "$LESSON_FILE" --video-id "$VIDEO_ID"

      # ── 7. Upload compiled videos as artifacts ─────────────────────────────
      - name: Upload rendered videos
        uses: actions/upload-artifact@v4
        with:
          name: generated-on-demand-videos
          path: "rag-learning-series/**/*.mp4"
          retention-days: 14

      # ── 8. Commit to current repo ───────────────────────────────────────────
      - name: Commit generated videos to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rag-learning-series/
          git commit -m "feat: Manual RE-GENERATE & render of lesson ${{ github.event.inputs.day_number }}" || echo "No changes to commit"
          git push

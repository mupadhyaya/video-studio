name: Render On Demand

on:
  workflow_dispatch:
    inputs:
      lesson_path:
        description: "Path to the lesson JSON file (e.g., rag-learning-series-repo/lesson_001/lesson_001.json)"
        required: true
        default: "rag-learning-series-repo/lesson_001/lesson_001.json"

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      YOUTUBE_OAUTH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_TOKEN }}

    steps:
      # ── 1. Checkout repository ─────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 3. Install system dependencies ─────────────────────────────────────
      - name: Install ffmpeg and fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-dejavu

      # ── 4. Install Python dependencies ─────────────────────────────────────
      - name: Install Python packages
        run: pip install -r requirements.txt

      # ── 5. Render dual-language videos (Skip generation step) ──────────────
      - name: Render presentation videos
        run: |
          LESSON_FILE="${{ github.event.inputs.lesson_path }}"
          VIDEO_ID=$(basename "$LESSON_FILE" .json)
          echo "Rendering from: $LESSON_FILE (video-id: $VIDEO_ID)"
          python run_pipeline.py --input "$LESSON_FILE" --video-id "$VIDEO_ID"

      # ── 6. Upload compiled videos as artifacts ─────────────────────────────
      - name: Upload rendered videos
        uses: actions/upload-artifact@v4
        with:
          name: on-demand-rendered-videos
          path: "rag-learning-series-repo/**/*.mp4"
          retention-days: 14

      # ── 7. Push compiled videos to dedicated learning repo ──────────────────
      - name: Push to Dedicated Repo
        run: |
          # Clone the target repo using PAT
          git clone https://x-access-token:${{ secrets.SERIES_REPO_PAT }}@github.com/mupadhyaya/rag-learning-series.git external_repo
          
          # Copy the generated lesson output (JSON, MP4s, PNGs) into the repo
          cp -r rag-learning-series-repo/* external_repo/
          
          cd external_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "feat: Manual re-render of ${{ github.event.inputs.lesson_path }}" || echo "No changes to commit"
          git push

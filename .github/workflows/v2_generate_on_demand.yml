name: V2 Generate & Render On Demand

on:
  workflow_dispatch:
    inputs:
      day_number:
        description: "Day/Lesson number to generate (e.g., 1 for lesson_001)"
        required: true
        default: "1"
      language:
        description: "Language to render (en, hi, all)"
        required: true
        default: "all"

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      YOUTUBE_OAUTH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_TOKEN }}

    steps:
      # ── 1. Checkout repository ─────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 3. Install system dependencies ─────────────────────────────────────
      - name: Install ffmpeg and fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-dejavu

      # ── 4. Cache ML Models ─────────────────────────────────────────────────
      - name: Cache Wav2Lip Models
        uses: actions/cache@v3
        with:
          path: Wav2Lip/checkpoints
          key: ${{ runner.os }}-wav2lip-models
          restore-keys: |
            ${{ runner.os }}-wav2lip-models

      # ── 5. Install Python dependencies ─────────────────────────────────────
      - name: Install Python packages
        run: |
          pip install -r requirements.txt
          pip install -r requirements_v2.txt

      # ── 5. Generate lesson JSON via Gemini ─────────────────────────────────
      - name: Generate daily lesson JSON
        run: python generate_daily_script.py --day ${{ github.event.inputs.day_number }}

      # ── 6. Render dual-language videos ─────────────────────────────────────
      - name: Render presentation videos
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN_GIST }}
        run: |
          echo "Rendering from: $LESSON_DIR/lesson_*.json (video-id: $VIDEO_ID)"
          python run_pipeline_v2.py --input "$LESSON_DIR/$VIDEO_ID.json" --video-id "v2_$VIDEO_ID" --lang "${{ github.event.inputs.language }}"

      # ── 7. Upload compiled videos as artifacts ─────────────────────────────
      - name: Upload rendered videos
        uses: actions/upload-artifact@v4
        with:
          name: generated-on-demand-videos
          path: "${{ env.SERIES_DIR }}/**/*.mp4"
          retention-days: 14

      # ── 8. Commit to current repo ───────────────────────────────────────────
      - name: Commit generated videos to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *_learning_series/
          git commit -m "feat: Manual RE-GENERATE & render of lesson ${{ github.event.inputs.day_number }}" || echo "No changes to commit"
          git push

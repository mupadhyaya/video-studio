name: V2 Render On Demand

on:
  workflow_dispatch:
    inputs:
      lesson_path:
        description: 'Path to the lesson JSON (e.g. rag_learning_series/lesson_001/lesson_001.json)'
        required: true
        default: 'rag_learning_series/lesson_001/lesson_001.json'
      language:
        description: "Language to render (en, hi, all)"
        required: true
        default: "all"

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      YOUTUBE_OAUTH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_TOKEN }}

    steps:
      # ── 1. Checkout repository ─────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 3. Install system dependencies ─────────────────────────────────────
      - name: Install ffmpeg and fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-dejavu

      # ── 4. Cache ML Models ─────────────────────────────────────────────────
      - name: Cache Wav2Lip Models
        uses: actions/cache@v3
        with:
          path: Wav2Lip/checkpoints
          key: ${{ runner.os }}-wav2lip-models
          restore-keys: |
            ${{ runner.os }}-wav2lip-models

      # ── 5. Install Python dependencies ─────────────────────────────────────
      - name: Install Python packages
        run: pip install -r requirements_v2.txt

      # ── 5. Render dual-language videos ─────────────────────────────────────
      - name: Render presentation videos
        run: |
          LESSON_FILE="${{ github.event.inputs.lesson_path }}"
          VIDEO_ID=$(basename "$LESSON_FILE" .json)
          SERIES_DIR=$(echo "$LESSON_FILE" | cut -d'/' -f1)
          echo "SERIES_DIR=$SERIES_DIR" >> $GITHUB_ENV
          echo "Rendering from: $LESSON_FILE (video-id: $VIDEO_ID)"
          python run_pipeline_v2.py --input "$LESSON_FILE" --video-id "v2_$VIDEO_ID" --lang "${{ github.event.inputs.language }}"

      # ── 6. Upload compiled videos as artifacts ─────────────────────────────
      - name: Upload rendered videos
        uses: actions/upload-artifact@v4
        with:
          name: on-demand-rendered-videos
          path: "${{ env.SERIES_DIR }}/**/*.mp4"
          retention-days: 14

      # ── 7. Commit to current repo ───────────────────────────────────────────
      - name: Commit generated videos to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *_learning_series/
          git commit -m "feat: Manual re-render of ${{ github.event.inputs.lesson_path }}" || echo "No changes to commit"
          git push
